<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>

body{
font-family: Arial;
background-color:#f4f6f8;
text-align:center;
}

.container{
width:350px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
color:#333;
}

input{
width:70%;
padding:8px;
border:1px solid gray;
border-radius:5px;
}

button{
padding:8px 15px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:#45a049;
}

li{
list-style:none;
background:#e3eaf2;
margin:8px;
padding:8px;
border-radius:5px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>My To Do List</h2>

<input type="text" id="task" placeholder="Enter task">

<button onclick="addTask()">Add</button>

<ul id="list"></ul>

</div>

<script>

function addTask(){

let task=document.getElementById("task").value;

if(task==""){
alert("Enter task");
return;
}

let li=document.createElement("li");

li.textContent=task;

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";

}

</script>

</body>
</html>
